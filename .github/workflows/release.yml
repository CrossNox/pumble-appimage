name: Check for new Pumble version

# NOTE: GitHub pauses scheduled workflows after ~60 days without repo
# activity. If releases stop appearing, re-enable it from the Actions tab.
on:
  schedule:
    - cron: '17 6 * * *'   # daily at 06:17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check upstream feed
        id: feed
        run: |
          # Releases create tags, so an existing v$VERSION tag means
          # this version was already published.
          VERSION="$(./fetch-and-build.sh --check)"
          if git ls-remote --exit-code --tags origin "refs/tags/v$VERSION" >/dev/null 2>&1; then
            echo "Release v$VERSION already exists, nothing to do."
            echo "new=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version: $VERSION"
            echo "new=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download deb and build AppImage
        if: steps.feed.outputs.new == 'true'
        run: ./fetch-and-build.sh

      - name: Publish release
        if: steps.feed.outputs.new == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.feed.outputs.version }}
          name: Pumble ${{ steps.feed.outputs.version }}
          body: >
            AppImage repackaged from the official deb
            `${{ steps.feed.outputs.deb }}` published
            ${{ steps.feed.outputs.date }}, sha512-verified against the
            upstream update feed.
          files: Pumble-*-x86_64.AppImage
