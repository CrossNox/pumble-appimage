name: Lint

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - run: sudo apt-get update && sudo apt-get install -y shellcheck
      - run: shellcheck pumble-appimage.sh
