name: Lint

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: sudo apt-get update && sudo apt-get install -y shellcheck
      - run: shellcheck pumble-appimage.sh
